name: jumpup_app
description: JumpUp - Plataforma móvil para aprendizaje de idiomas
publish_to: none
version: 1.0.1+3

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ─────────────────────────────────────────────
  # Gestión de estado
  # ─────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ─────────────────────────────────────────────
  # Navegación
  # ─────────────────────────────────────────────
  go_router: ^14.2.7

  # ─────────────────────────────────────────────
  # Peticiones HTTP
  # ─────────────────────────────────────────────
  dio: ^5.10.0
  http: ^1.2.2
  http_parser: ^4.1.0

  # ─────────────────────────────────────────────
  # WebSocket (chat en vivo + notificaciones)
  # ─────────────────────────────────────────────
  web_socket_channel: ^3.0.3

  # ─────────────────────────────────────────────
  # Almacenamiento seguro (JWT)
  # ─────────────────────────────────────────────
  flutter_secure_storage: ^10.3.1
  shared_preferences: ^2.5.2

  # ─────────────────────────────────────────────
  # Caché de imágenes
  # ─────────────────────────────────────────────
  cached_network_image: ^3.4.1

  # ─────────────────────────────────────────────
  # Modelos
  # ─────────────────────────────────────────────
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # ─────────────────────────────────────────────
  # Variables de entorno
  # ─────────────────────────────────────────────
  flutter_dotenv: ^5.2.1

  # ─────────────────────────────────────────────
  # Internacionalización
  # ─────────────────────────────────────────────
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
 
  # ─────────────────────────────────────────────
  # Pagos y enlaces externos (Stripe)
  # ─────────────────────────────────────────────
  url_launcher: ^6.3.0
  webview_flutter: ^4.2.1
  flutter_stripe: 13.1.0   # <--- cambia ^13.1.0 por 13.1.0
  jwt_decoder: ^2.0.1
  youtube_player_flutter: ^9.1.0
  
  # ─────────────────────────────────────────────
  # Tipografía premium
  # ─────────────────────────────────────────────
  google_fonts: ^8.1.0

  # ─────────────────────────────────────────────
  # Autenticación con Google
  # ─────────────────────────────────────────────
  google_sign_in: ^6.2.1

  # ─────────────────────────────────────────────
  # Autenticación biométrica (huella dactilar)
  # ─────────────────────────────────────────────
  local_auth: ^2.3.0

  # ─────────────────────────────────────────────
  # Notificaciones locales (push)
  # ─────────────────────────────────────────────
  flutter_local_notifications: ^22.0.1

  # ─────────────────────────────────────────────
  # Selección de imagen (avatar de perfil)
  # ─────────────────────────────────────────────
  image_picker: ^1.2.3

  # ─────────────────────────────────────────────
  # Escáner QR — temporalmente desactivado
  # (genera warning KGP con versiones actuales)
  # Reactivar cuando mobile_scanner publique
  # soporte para Built-in Kotlin
  # mobile_scanner: ^7.2.0
  # ─────────────────────────────────────────────

  # ─────────────────────────────────────────────
  # Animaciones premium
  # ─────────────────────────────────────────────
  animate_do: ^5.1.0
  lottie: ^3.5.1
  firebase_core: ^3.10.1
  firebase_messaging: ^15.2.10
  firebase_analytics: ^11.2.1
  firebase_crashlytics: ^4.0.1
  device_info_plus: ^11.1.0

  # ─────────────────────────────────────────────
  # Multimedia y Sensores (Nuevas funcionalidades)
  # ─────────────────────────────────────────────
  share_plus: ^10.1.2
  permission_handler: ^11.3.1
  camera: ^0.11.0+2
  record: ^7.0.0
  speech_to_text: ^7.4.0
  file_picker: ^11.0.2
  path_provider: ^2.1.3
  connectivity_plus: ^6.0.3
  google_mlkit_text_recognition: ^0.13.0
  flutter_webrtc: ^0.12.0
  sentry_flutter: ^9.2.0
  audioplayers: ^6.1.0
  upgrader: ^13.5.0
  pub_semver: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.3.13
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/JumpUp_Logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/JumpUp_Logo.png"

flutter:
  generate: true
  uses-material-design: true

  assets:
    - .env
    - assets/fonts/
    - assets/images/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
