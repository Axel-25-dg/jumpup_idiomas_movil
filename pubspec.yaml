name: jumpup_app
description: JumpUp - Plataforma móvil para aprendizaje de idiomas
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ─────────────────────────────────────────────
  # Gestión de estado
  # ─────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ─────────────────────────────────────────────
  # Navegación
  # ─────────────────────────────────────────────
  go_router: ^14.2.7

  # ─────────────────────────────────────────────
  # Peticiones HTTP
  # ─────────────────────────────────────────────
  dio: ^5.10.0
  http: ^1.2.2
  http_parser: ^4.1.0

  # ─────────────────────────────────────────────
  # WebSocket (chat en vivo + notificaciones)
  # ─────────────────────────────────────────────
  web_socket_channel: ^3.0.3

  # ─────────────────────────────────────────────
  # Almacenamiento seguro (JWT)
  # ─────────────────────────────────────────────
  flutter_secure_storage: ^10.3.1

  # ─────────────────────────────────────────────
  # Caché de imágenes
  # ─────────────────────────────────────────────
  cached_network_image: ^3.4.1

  # ─────────────────────────────────────────────
  # Modelos
  # ─────────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ─────────────────────────────────────────────
  # Variables de entorno
  # ─────────────────────────────────────────────
  flutter_dotenv: ^5.2.1

  # ─────────────────────────────────────────────
  # Internacionalización
  # ─────────────────────────────────────────────
  intl: ^0.19.0
 
  # ─────────────────────────────────────────────
  # Pagos y enlaces externos (Stripe)
  # ─────────────────────────────────────────────
  url_launcher: ^6.3.0
  
  # ─────────────────────────────────────────────
  # Tipografía premium
  # ─────────────────────────────────────────────
  google_fonts: ^8.1.0

  # ─────────────────────────────────────────────
  # Autenticación con Google
  # ─────────────────────────────────────────────
  google_sign_in: ^6.2.1

  # ─────────────────────────────────────────────
  # Autenticación biométrica (huella dactilar)
  # ─────────────────────────────────────────────
  local_auth: ^2.3.0

  # ─────────────────────────────────────────────
  # Notificaciones locales (push)
  # ─────────────────────────────────────────────
  flutter_local_notifications: ^22.0.1

  # ─────────────────────────────────────────────
  # Selección de imagen (avatar de perfil)
  # ─────────────────────────────────────────────
  image_picker: ^1.2.3

  # ─────────────────────────────────────────────
  # Escáner QR
  # ─────────────────────────────────────────────
  mobile_scanner: ^7.2.0

  # ─────────────────────────────────────────────
  # Animaciones premium
  # ─────────────────────────────────────────────
  animate_do: ^5.1.0
  lottie: ^3.5.1
  firebase_core: ^3.10.1
  firebase_messaging: ^16.4.1
  device_info_plus: ^13.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true

  assets:
    - .env
