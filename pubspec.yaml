name: jumpup_app
description: JumpUp - Plataforma móvil para aprendizaje de idiomas
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ─────────────────────────────────────────────
  # Gestión de estado
  # ─────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ─────────────────────────────────────────────
  # Navegación
  # ─────────────────────────────────────────────
  go_router: ^14.2.7

  # ─────────────────────────────────────────────
  # Peticiones HTTP
  # ─────────────────────────────────────────────
  dio: ^5.7.0

  # ─────────────────────────────────────────────
  # Almacenamiento seguro (JWT)
  # ─────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2

  # ─────────────────────────────────────────────
  # Caché de imágenes
  # ─────────────────────────────────────────────
  cached_network_image: ^3.4.1

  # ─────────────────────────────────────────────
  # Modelos
  # ─────────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # ─────────────────────────────────────────────
  # Variables de entorno
  # ─────────────────────────────────────────────
  flutter_dotenv: ^5.2.1

  # ─────────────────────────────────────────────
  # Internacionalización
  # ─────────────────────────────────────────────
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3
  custom_lint: ^0.7.0
  riverpod_lint: ^2.3.13

flutter:
  uses-material-design: true

  assets:
    - .env
